<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TED英语 · 雅思口语词块学习</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,400&family=DM+Sans:wght@300;400;500&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#0e0d0b; --paper:#f7f3ec; --cream:#ede8de; --warm:#d9d1c0;
  --red:#c0392b; --gold:#b5892e; --muted:#8a8070;
  --op:#6b3fa0; --ex:#1a6b8a; --tr:#b85c00; --em:#a0264a; --co:#2a7a4a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--paper);color:var(--ink);font-family:'DM Sans','Noto Serif SC',sans-serif;min-height:100vh;}

body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.5;}

/* Nav */
nav {
  position: sticky; top:0; z-index:100;
  background:rgba(247,243,236,.95); backdrop-filter:blur(10px);
  border-bottom:1px solid var(--warm);
  padding:0 48px;
  display:flex; align-items:center; gap:0; height:56px;
}
.nav-logo {
  font-family:'Cormorant Garamond',serif;
  font-size:22px; font-weight:600;
  color:var(--ink);
  display:flex; align-items:center; gap:10px;
  text-decoration:none;
}
.nav-logo .dot { width:8px; height:8px; border-radius:50%; background:var(--red); }
.nav-links { margin-left:auto; display:flex; gap:28px; }
.nav-link { font-size:13px; color:var(--muted); text-decoration:none; transition:color .2s; }
.nav-link:hover { color:var(--ink); }

/* Hero */
.hero {
  padding: 80px 48px 64px;
  display:grid; grid-template-columns:1fr 1fr; gap:40px; align-items:center;
  max-width:1200px; margin:0 auto;
}
.hero-eyebrow {
  font-size:11px; letter-spacing:3px; text-transform:uppercase;
  color:var(--muted); margin-bottom:20px;
  display:flex; align-items:center; gap:10px;
}
.hero-eyebrow::before { content:''; width:24px; height:1px; background:var(--muted); }
.hero-h1 {
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(40px,5vw,68px); font-weight:600; line-height:1.05;
  margin-bottom:20px;
}
.hero-h1 em { font-style:italic; color:var(--red); }
.hero-p { font-size:15px; color:var(--muted); line-height:1.75; max-width:440px; margin-bottom:36px; }
.hero-stats { display:flex; gap:32px; }
.stat-n { font-family:'Cormorant Garamond',serif; font-size:36px; font-weight:600; line-height:1; }
.stat-l { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-top:2px; }

/* Hero visual */
.hero-visual {
  display:flex; flex-direction:column; gap:12px;
}
.tag-cloud {
  display:flex; flex-wrap:wrap; gap:8px;
}
.tag {
  padding:6px 14px; border-radius:20px; font-size:12px; font-weight:500;
  border:1.5px solid; cursor:default;
}
.tag-op { border-color:var(--op); color:var(--op); background:rgba(107,63,160,.06); }
.tag-ex { border-color:var(--ex); color:var(--ex); background:rgba(26,107,138,.06); }
.tag-tr { border-color:var(--tr); color:var(--tr); background:rgba(184,92,0,.06); }
.tag-em { border-color:var(--em); color:var(--em); background:rgba(160,38,74,.06); }
.tag-co { border-color:var(--co); color:var(--co); background:rgba(42,122,74,.06); }

/* Search & filter */
.toolbar {
  max-width:1200px; margin:0 auto;
  padding:0 48px 32px;
  display:flex; align-items:center; gap:16px; flex-wrap:wrap;
}
.search-wrap { position:relative; flex:1; min-width:200px; max-width:320px; }
.search-wrap input {
  width:100%; padding:9px 14px 9px 36px;
  border:1.5px solid var(--warm); border-radius:24px;
  background:#fff; font-family:inherit; font-size:14px; color:var(--ink); outline:none;
  transition:border-color .2s;
}
.search-wrap input:focus { border-color:var(--red); }
.search-wrap::before { content:'⌕'; position:absolute; left:12px; top:50%; transform:translateY(-50%); font-size:16px; color:var(--muted); pointer-events:none; }
.filter-tags { display:flex; gap:8px; flex-wrap:wrap; }
.ftag {
  padding:6px 14px; border-radius:16px; border:1.5px solid var(--warm);
  background:transparent; font-size:12px; color:var(--muted);
  cursor:pointer; transition:all .2s; font-family:inherit;
}
.ftag:hover { border-color:var(--ink); color:var(--ink); }
.ftag.on { background:var(--ink); border-color:var(--ink); color:var(--paper); }
.results-count { margin-left:auto; font-size:13px; color:var(--muted); }

/* Grid */
.grid {
  max-width:1200px; margin:0 auto;
  padding:0 48px 80px;
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap:24px;
}

/* Card */
.card {
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  border:1px solid rgba(0,0,0,.07);
  cursor:pointer;
  transition:transform .22s, box-shadow .22s;
  text-decoration:none;
  color:inherit;
  display:block;
  opacity:0; transform:translateY(16px);
  animation: fadeUp .5s forwards;
}
@keyframes fadeUp { to { opacity:1; transform:translateY(0); } }
.card:hover {
  transform:translateY(-4px);
  box-shadow:0 12px 40px rgba(0,0,0,.1);
}
.card-thumb {
  position:relative; width:100%; padding-bottom:56.25%; overflow:hidden;
  background:var(--cream);
}
.card-thumb img {
  position:absolute; inset:0; width:100%; height:100%;
  object-fit:cover; transition:transform .4s;
}
.card:hover .card-thumb img { transform:scale(1.04); }
.card-thumb-fallback {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg,var(--cream),var(--warm));
  font-family:'Cormorant Garamond',serif; font-size:32px; font-style:italic;
  color:var(--muted);
}
.card-level {
  position:absolute; top:12px; right:12px;
  background:rgba(14,13,11,.7); color:#fff;
  font-size:11px; padding:3px 10px; border-radius:10px; letter-spacing:.5px;
}
.card-body { padding:20px 22px 18px; }
.card-speaker { font-size:12px; color:var(--muted); margin-bottom:6px; }
.card-title {
  font-family:'Cormorant Garamond',serif;
  font-size:20px; font-weight:600; line-height:1.25;
  margin-bottom:4px;
}
.card-title-zh { font-size:13px; color:var(--muted); font-family:'Noto Serif SC',serif; margin-bottom:10px; }
.card-desc { font-size:13px; color:#555; line-height:1.6; margin-bottom:14px;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.card-tags { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
.card-tag {
  font-size:11px; padding:2px 9px; border-radius:8px;
  background:var(--cream); color:var(--muted);
}
.card-footer {
  display:flex; justify-content:space-between; align-items:center;
  padding-top:12px; border-top:1px solid var(--cream);
}
.card-meta { font-size:12px; color:var(--muted); display:flex; gap:12px; }
.card-stats { display:flex; gap:12px; }
.card-stat {
  font-size:11px; color:var(--muted);
  display:flex; align-items:center; gap:4px;
}
.card-stat strong { color:var(--red); }
.card-btn {
  font-size:12px; font-weight:500;
  color:var(--red); display:flex; align-items:center; gap:4px;
  transition:gap .2s;
}
.card:hover .card-btn { gap:8px; }

/* Empty */
.empty { grid-column:1/-1; padding:60px; text-align:center; color:var(--muted); }
.empty-icon { font-size:36px; margin-bottom:12px; opacity:.3; }

/* Footer */
footer {
  border-top:1px solid var(--warm); padding:32px 48px;
  display:flex; justify-content:space-between; align-items:center;
  font-size:13px; color:var(--muted); max-width:1200px; margin:0 auto;
}

@media(max-width:768px){
  .hero { grid-template-columns:1fr; padding:40px 20px; }
  .hero-visual { display:none; }
  .toolbar, .grid { padding-left:20px; padding-right:20px; }
  nav { padding:0 20px; }
}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">
    <span class="dot"></span>
    TED英语词块
  </a>
  <div class="nav-links">
    <a class="nav-link" href="#">全部演讲</a>
    <a class="nav-link" href="#">使用指南</a>
  </div>
</nav>

<!-- Hero -->
<section class="hero">
  <div>
    <div class="hero-eyebrow">雅思口语 · IELTS Speaking</div>
    <h1 class="hero-h1">用 TED 演讲<br>学<em>地道口语</em>词块</h1>
    <p class="hero-p">精选经典 TED 演讲，双语字幕 + 雅思高分词块高亮，悬停查看替换表达，让你的口语从 Band 6 到 Band 7+。</p>
    <div class="hero-stats">
      <div><div class="stat-n" id="totalTalks">0</div><div class="stat-l">篇演讲</div></div>
      <div><div class="stat-n" id="totalChunks">0</div><div class="stat-l">个词块</div></div>
      <div><div class="stat-n">5</div><div class="stat-l">种词块类型</div></div>
    </div>
  </div>
  <div class="hero-visual">
    <div class="tag-cloud" id="tagCloud"></div>
  </div>
</section>

<!-- Toolbar -->
<div class="toolbar">
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="搜索演讲或演讲者…" oninput="render()">
  </div>
  <div class="filter-tags" id="filterTags"></div>
  <div class="results-count" id="resultsCount"></div>
</div>

<!-- Grid -->
<div class="grid" id="grid"></div>

<footer>
  <span>TED英语词块 · 用经典演讲学地道口语</span>
  <span>内容仅供学习参考</span>
</footer>

<script>
const TALKS = [
  { id:"matt-cutts-30days", title:"Try Something New for 30 Days", title_zh:"尝试做新事情30天", speaker:"Matt Cutts", year:2011, duration:"3分钟", level:"B1", tags:["习惯","挑战","成长"], description:"谷歌工程师 Matt Cutts 用亲身经历告诉你：只需30天，就能养成一个新习惯，甚至改变你的人生轨迹。简短有力，词汇简单，非常适合雅思口语练习。", thumbnail:"https://pi.tedcdn.com/r/talkstar-photos.s3.amazonaws.com/uploads/b1c9bd42-eba7-4375-a4f1-f96d33de9ee2/MattCutts_2011U-embed.jpg?quality=89&w=800", chunks_count:12, words_count:15, cues:[], chunks:[] },
  { id:"derek-sivers-goals", title:"Keep Your Goals to Yourself", title_zh:"不要公开你的目标", speaker:"Derek Sivers", year:2010, duration:"3分钟", level:"B1", tags:["目标","心理","习惯"], description:"心理研究显示，公开宣布目标反而会让你更难实现它。Derek Sivers 用研究数据颠覆了你对「设定目标」的常规认知，直接点燃雅思口语话题「目标与成功」。", thumbnail:"https://pi.tedcdn.com/r/talkstar-photos.s3.amazonaws.com/uploads/cec44b3e-d0c3-4e4b-8d63-a5e9eb0d2ff0/DerekSivers_2010G-embed.jpg?quality=89&w=800", chunks_count:9, words_count:12, cues:[], chunks:[] },
  { id:"joseph-pine-authenticity", title:"What Consumers Want", title_zh:"消费者真正想要什么", speaker:"Joseph Pine", year:2004, duration:"14分钟", level:"B2", tags:["商业","消费","真实性"], description:"经济学家 Joseph Pine 提出「体验经济」理论：在商品和服务之外，消费者真正渴望的是真实感。话题涵盖商业、消费社会，雅思口语高频考点。", thumbnail:"https://pi.tedcdn.com/r/talkstar-photos.s3.amazonaws.com/uploads/4a9c7b98-6d88-4b1a-8be7-3f3c3d9f7a55/JosephPine_2004-embed.jpg?quality=89&w=800", chunks_count:10, words_count:14, cues:[], chunks:[] },
];
</script>
<script>
// ── Init stats ──
document.getElementById('totalTalks').textContent = TALKS.length;
document.getElementById('totalChunks').textContent = TALKS.reduce((s,t) => s + t.chunks_count, 0);

// ── Tag cloud (all unique tags) ──
const allTags = [...new Set(TALKS.flatMap(t => t.tags))];
const tagTypes = ['op','ex','tr','em','co'];
const tagCloud = document.getElementById('tagCloud');
// Chunk type tags
[['观点表达','op'],['举例引用','ex'],['转折递进','tr'],['强调表达','em'],['日常口语','co']].forEach(([label, type]) => {
  const span = document.createElement('span');
  span.className = `tag tag-${type}`;
  span.textContent = label;
  tagCloud.appendChild(span);
});
// Topic tags
allTags.forEach(tag => {
  const span = document.createElement('span');
  span.className = 'tag';
  span.style.borderColor = 'var(--warm)';
  span.style.color = 'var(--muted)';
  span.textContent = tag;
  tagCloud.appendChild(span);
});

// ── Filters ──
let activeTag = null;
const filterTagsEl = document.getElementById('filterTags');
['全部', ...allTags].forEach(tag => {
  const btn = document.createElement('button');
  btn.className = 'ftag' + (tag === '全部' ? ' on' : '');
  btn.textContent = tag;
  btn.onclick = () => {
    activeTag = tag === '全部' ? null : tag;
    document.querySelectorAll('.ftag').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    render();
  };
  filterTagsEl.appendChild(btn);
});

// ── Render cards ──
function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  const filtered = TALKS.filter(t => {
    if (activeTag && !t.tags.includes(activeTag)) return false;
    if (q && !t.title.toLowerCase().includes(q) && !t.title_zh.includes(q) && !t.speaker.toLowerCase().includes(q)) return false;
    return true;
  });

  document.getElementById('resultsCount').textContent = `共 ${filtered.length} 篇`;

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">◇</div><div>没有找到匹配的演讲</div></div>';
    return;
  }

  filtered.forEach((talk, i) => {
    const a = document.createElement('a');
    a.className = 'card';
    a.href = `talk.html?id=${talk.id}`;
    a.style.animationDelay = `${i * 80}ms`;

    a.innerHTML = `
      <div class="card-thumb">
        ${talk.thumbnail
          ? `<img src="${talk.thumbnail}" alt="${talk.title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          : ''}
        <div class="card-thumb-fallback" ${talk.thumbnail ? 'style="display:none"' : ''}>TED</div>
        <span class="card-level">${talk.level}</span>
      </div>
      <div class="card-body">
        <div class="card-speaker">${talk.speaker} · ${talk.year}</div>
        <div class="card-title">${talk.title}</div>
        <div class="card-title-zh">${talk.title_zh}</div>
        <div class="card-desc">${talk.description}</div>
        <div class="card-tags">${talk.tags.map(tag => `<span class="card-tag">${tag}</span>`).join('')}</div>
        <div class="card-footer">
          <div class="card-meta">
            <span>${talk.duration}</span>
          </div>
          <div class="card-stats">
            <span class="card-stat"><strong>${talk.chunks_count}</strong> 词块</span>
            <span class="card-stat"><strong>${talk.words_count}</strong> 生词</span>
          </div>
          <div class="card-btn">开始学习 →</div>
        </div>
      </div>`;
    grid.appendChild(a);
  });
}

render();
</script>
</body>
</html>
