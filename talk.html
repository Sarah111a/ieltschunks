    cues:[
      {time:"00:03", en:"A few years ago, I felt like I was stuck in a rut, so I decided to follow in the footsteps of the great American philosopher, Morgan Spurlock, and try something new for 30 days.", zh:"几年前，我感觉自己陷入了一成不变的生活，所以我决定追随美国伟大的哲学家摩根·斯普尔洛克的脚步，尝试做新事情30天。"},
      {time:"00:03", en:"The idea is actually pretty simple. Think about something you've always wanted to add to your life and try it for the next 30 days.", zh:"这个想法其实非常简单。想想你一直想在生活中加入的事情，然后在接下来的30天里尝试去做。"},
      {time:"00:03", en:"It turns out 30 days is just about the right amount of time to add a new habit or subtract a habit -- like watching the news -- from your life.", zh:"事实证明，30天正好是在生活中养成一个新习惯或戒掉一个习惯——比如看新闻——的合适时间。"},
      {time:"00:34", en:"There's a few things I learned while doing these 30-day challenges. The first was, instead of the months flying by, forgotten, the time was much more memorable.", zh:"做这些30天挑战时，我学到了几件事。第一件是，那些时光不再像以往那样飞逝而过、被遗忘，而是变得更加难忘。"},
      {time:"00:34", en:"This was part of a challenge I did to take a picture every day for a month. And I remember exactly where I was and what I was doing that day.", zh:"这是我做的一个挑战的一部分——每天拍一张照片，持续一个月。我能清楚地记得那天我在哪里、在做什么。"},
      {time:"00:34", en:"I also noticed that as I started to do more and harder 30-day challenges, my self-confidence grew. I went from desk-dwelling computer nerd to the kind of guy who bikes to work. For fun!", zh:"我还注意到，随着我开始做越来越多、越来越难的30天挑战，我的自信心也增强了。我从一个整天坐在桌前的电脑宅男，变成了一个骑自行车上班的人，而且是为了乐趣！"},
      {time:"01:08", en:"Even last year, I ended up hiking up Mt. Kilimanjaro, the highest mountain in Africa. I would never have been that adventurous before I started my 30-day challenges.", zh:"就在去年，我甚至徒步登上了非洲最高峰——乞力马扎罗山。在我开始30天挑战之前，我从来不会有这么大的冒险精神。"},
      {time:"01:19", en:"I also figured out that if you really want something badly enough, you can do anything for 30 days. Have you ever wanted to write a novel?", zh:"我还发现，如果你真的非常想要某件事，你可以坚持做任何事情30天。你有没有想过写一部小说？"},
      {time:"01:19", en:"Every November, tens of thousands of people try to write their own 50,000-word novel, from scratch, in 30 days. It turns out, all you have to do is write 1,667 words a day for a month. So I did.", zh:"每年11月，数以万计的人尝试在30天内从头开始写一部5万字的小说。事实证明，你只需要每天写1667个字，坚持一个月。所以我就这么做了。"},
      {time:"01:19", en:"By the way, the secret is not to go to sleep until you've written your words for the day. You might be sleep-deprived, but you'll finish your novel.", zh:"顺便说一句，秘诀是：在写完当天的字数之前不要睡觉。你可能会睡眠不足，但你会完成你的小说。"},
      {time:"01:19", en:"Now is my book the next great American novel? No. I wrote it in a month. It's awful.", zh:"那我的书是下一部伟大的美国小说吗？不是。我在一个月内写完的，写得很糟糕。"},
      {time:"02:06", en:"But for the rest of my life, if I meet John Hodgman at a TED party, I don't have to say, 'I'm a computer scientist.' No, no, if I want to, I can say, 'I'm a novelist.'", zh:"但在我余生里，如果我在TED派对上遇到约翰·霍奇曼，我不必说'我是一个计算机科学家'了。不不，如果我愿意，我可以说'我是一个小说家'。"},
      {time:"02:21", en:"So here's one last thing I'd like to mention. I learned that when I made small, sustainable changes, things I could keep doing, they were more likely to stick.", zh:"所以最后我想说一件事。我发现，当我做出小的、可持续的改变，那些我能够坚持下去的事情，它们更有可能成为习惯。"},
      {time:"02:21", en:"There's nothing wrong with big, crazy challenges. In fact, they're a ton of fun. But they're less likely to stick.", zh:"大胆疯狂的挑战没有什么不对。事实上，它们非常有趣。但它们不太可能坚持下去。"},
      {time:"02:21", en:"When I gave up sugar for 30 days, day 31 looked like this.", zh:"当我戒糖30天后，第31天就变成了这个样子。"},
      {time:"02:45", en:"So here's my question to you: What are you waiting for? I guarantee you the next 30 days are going to pass whether you like it or not, so why not think about something you have always wanted to try and give it a shot for the next 30 days.", zh:"所以我的问题是：你在等什么？我保证接下来的30天无论如何都会过去，那为什么不想想你一直想尝试的事情，然后在接下来的30天里试一试呢？"}
    ],
    chunks:[

      {type:"tr",chunk:"It turns out",zh:"事实证明;原来",score:"Band 6.5+",alts:["As it happens","In the end","Interestingly enough"]},
      {type:"op",chunk:"the months flying by",zh:"时间飞逝",score:"Band 7+",alts:["time passing quickly","days slipping away","the days rushing past"]},
      {type:"em",chunk:"much more memorable",zh:"更加难忘",score:"Band 6+",alts:["far more unforgettable","significantly more impactful","truly noteworthy"]},

  {
    id:"derek-sivers-goals",
    title:"Keep Your Goals to Yourself",
    title_zh:"不要公开你的目标",
    speaker:"Derek Sivers", 
    year:2010, 
    duration:"3分钟",
    embed_url:"https://player.bilibili.com/player.html?aid=497794921&page=1&high_quality=1&danmaku=0",
    cues:[
      {time:"00:04", en:"Everyone, please think of your biggest personal goal. For real -- you can take a second. You've got to feel this to learn it.", zh:"请大家想想你最大的个人目标。认真的——你可以想一秒钟。你必须感受到它才能学到东西。"},
      {time:"00:04", en:"Take a few seconds and think of your personal biggest goal, okay? Imagine deciding right now that you're going to do it.", zh:"花几秒钟想想你最大的个人目标，好吗？想象一下，现在就决定你要去做它。"},
      {time:"00:04", en:"Imagine telling someone that you meet today what you're going to do. Imagine their congratulations, and their high image of you. Doesn't it feel good to say it out loud?", zh:"想象一下，告诉你今天遇到的某个人你要做什么。想象他们的祝贺，以及他们对你的高度评价。大声说出来感觉很好，不是吗？"},
      {time:"00:04", en:"Don't you feel one step closer already, like it's already becoming part of your identity?", zh:"你是不是已经感觉近了一步，好像它已经成为你身份的一部分？"},
      {time:"00:32", en:"Well, bad news: you should have kept your mouth shut, because that good feeling now will make you less likely to do it.", zh:"嗯，坏消息：你应该闭嘴的，因为现在这种好感觉会让你更不可能去实现它。"},
      {time:"00:32", en:"The repeated psychology tests have proven that telling someone your goal makes it less likely to happen.", zh:"反复的心理测试已经证明，告诉别人你的目标会让它更不可能发生。"},
      {time:"00:32", en:"Any time you have a goal, there are some steps that need to be done, some work that needs to be done in order to achieve it. Ideally you would not be satisfied until you'd actually done the work.", zh:"任何时候你有一个目标，都需要完成一些步骤，需要做一些工作才能实现它。理想情况下，在你真正完成工作之前，你不应该感到满足。"},
      {time:"00:32", en:"But when you tell someone your goal and they acknowledge it, psychologists have found that it's called a 'social reality.' The mind is kind of tricked into feeling that it's already done.", zh:"但是当你告诉别人你的目标而他们承认它时，心理学家发现这被称为'社会现实'。大脑会被欺骗，感觉它已经完成了。"},
      {time:"00:32", en:"And then because you've felt that satisfaction, you're less motivated to do the actual hard work necessary.", zh:"然后因为你感受到了那种满足感，你就不太有动力去做实际需要的艰难工作了。"},
      {time:"01:12", en:"So this goes against conventional wisdom that we should tell our friends our goals, right? So they hold us to it.", zh:"所以这违背了常规智慧——我们应该告诉朋友我们的目标，对吧？这样他们可以督促我们。"},
      {time:"01:19", en:"So, let's look at the proof. 1926: Kurt Lewin, founder of social psychology, called this 'substitution.' 1933: Wera Mahler found when it was acknowledged by others, it felt real in the mind. 1982, Peter Gollwitzer wrote a whole book about this, and in 2009, he did some new tests that were published.", zh:"那么，让我们看看证据。1926年：社会心理学创始人库尔特·勒温称之为'替代'。1933年：韦拉·马勒发现，当目标被他人认可时，在大脑中会感觉已经实现了。1982年，彼得·戈尔维策写了一整本书讲这个，2009年，他做了一些新的实验并发表了。"},
      {time:"01:37", en:"It goes like this: 163 people across four separate tests. Everyone wrote down their personal goal. Then half of them announced their commitment to this goal to the room, and half didn't.", zh:"是这样的：四项独立测试，163人参与。每个人都写下了自己的个人目标。然后一半人向房间里的人宣布了他们对这个目标的承诺，另一半没有。"},
      {time:"01:37", en:"Then everyone was given 45 minutes of work that would directly lead them towards their goal, but they were told that they could stop at any time.", zh:"然后每个人都被给予45分钟的工作，这些工作会直接帮助他们实现目标，但被告知他们可以随时停止。"},
      {time:"01:37", en:"Now, those who kept their mouths shut worked the entire 45 minutes on average, and when asked afterward, said that they felt that they had a long way to go still to achieve their goal.", zh:"那些保持沉默的人平均工作了整整45分钟，事后被问及时，说他们感觉距离实现目标还有很长的路要走。"},
      {time:"01:37", en:"But those who had announced it quit after only 33 minutes, on average, and when asked afterward, said that they felt much closer to achieving their goal.", zh:"但那些宣布了目标的人平均只工作了33分钟就放弃了，事后被问及时，说他们感觉距离实现目标近多了。"},
      {time:"02:16", en:"So if this is true, what can we do? Well, you could resist the temptation to announce your goal. You can delay the gratification that the social acknowledgment brings, and you can understand that your mind mistakes the talking for the doing.", zh:"那么如果这是真的，我们能做什么？嗯，你可以抵制宣布目标的诱惑。你可以延迟社会认可带来的满足感，你可以理解，你的大脑会把谈论误认为是在做事。"},
      {time:"02:16", en:"But if you do need to talk about something, you can state it in a way that gives you no satisfaction, such as, 'I really want to run this marathon, so I need to train five times a week and kick my ass if I don't, okay?'", zh:"但如果你确实需要谈论某事，你可以用一种让你没有满足感的方式表达它，比如，'我真的很想参加这场马拉松，所以我需要每周训练五次，如果没做到就自我惩罚，好吗？'"},
      {time:"02:46", en:"So audience, next time you're tempted to tell someone your goal, what will you say?", zh:"所以，观众们，下次当你忍不住想告诉别人你的目标时，你会怎么说？"}
    ],

  "derek-sivers-goals": [
    {word:"psychology",zh:"心理学；心理",freq:"Academic 极高频",collocations:"social psychology / psychology research / applied psychology"},
    {word:"conventional",zh:"传统的；常规的",freq:"Academic 高频",collocations:"conventional wisdom / conventional approach / conventional thinking"},
    {word:"acknowledge",zh:"承认；认可",freq:"Academic 高频",collocations:"acknowledge a goal / acknowledge the fact / widely acknowledged"},
    {word:"satisfaction",zh:"满足感；满意",freq:"Academic 高频",collocations:"sense of satisfaction / feel satisfaction / personal satisfaction"},
    {word:"motivated",zh:"有动力的；积极的",freq:"Academic 高频",collocations:"highly motivated / stay motivated / motivated to achieve"},
    {word:"commitment",zh:"承诺；投入",freq:"Academic 高频",collocations:"commitment to a goal / strong commitment / show commitment"},
    {word:"gratification",zh:"满足；快感",freq:"Academic 中频",collocations:"delay gratification / instant gratification / social gratification"}
  ]
};

// 获取URL参数
var params = new URLSearchParams(location.search);
var talkId = params.get('id');
var TALK = null;

// 查找对应的演讲
for (var i = 0; i < TALKS.length; i++) {
  if (TALKS[i].id === talkId) {
    TALK = TALKS[i];
    break;
  }
}

var vocabList = VOCAB[talkId] || [];

// Tooltip控制
function showVocTip(event, word, meaning, freq, collocations) {
  var tip = document.getElementById('tipBox');
  document.getElementById('tipWord').textContent = word;
  document.getElementById('tipMeaning').textContent = meaning;
  document.getElementById('tipFreq').textContent = freq;
  document.getElementById('tipCollocations').textContent = collocations;
  tip.classList.add('show');
  var x = event.clientX + 12;
  var y = event.clientY - 10;
  if (x + 250 > window.innerWidth) x = event.clientX - 262;
  if (y + 160 > window.innerHeight) y = event.clientY - 170;
  tip.style.left = Math.max(8, x) + 'px';
  tip.style.top = Math.max(8, y) + 'px';
}

function hideVocTip() {
  document.getElementById('tipBox').classList.remove('show');
}

// 页面初始化
if (!TALK) {
  document.getElementById('txBody').innerHTML = '<div class="error-message"><strong>演讲未找到</strong><br>请返回首页选择演讲。</div>';
  document.getElementById('videoLoading').textContent = '演讲数据未找到';
} else {
  // 更新页面信息
  document.title = TALK.title_zh + ' · TED英语词块';
  document.getElementById('navTitle').textContent = TALK.title_zh;
  document.getElementById('tTitle').textContent = TALK.title;
  document.getElementById('tSub').textContent = TALK.speaker + ' · ' + TALK.year + ' · ' + TALK.duration;
  
  // 设置视频
  var videoFrame = document.getElementById('videoFrame');
  videoFrame.src = TALK.embed_url;
  
  // 5秒后隐藏加载提示
  setTimeout(function() {
    var loadingEl = document.getElementById('videoLoading');
    if (loadingEl) {
      loadingEl.style.display = 'none';
    }
  }, 5000);

  var typeLabel = {op:'观点',ex:'举例',tr:'转折',em:'强调',co:'日常'};

  // 高亮文本函数
  function highlightText(text) {
    var out = text;
    
    // 先高亮词块
    for (var j = 0; j < TALK.chunks.length; j++) {
      var c = TALK.chunks[j];
      var re = new RegExp(c.chunk.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi');
      out = out.replace(re, '§CH§' + c.type + '§' + c.chunk + '§/CH§');
    }
    
    // 再高亮词汇
    for (var v = 0; v < vocabList.length; v++) {
      var voc = vocabList[v];
      var re2 = new RegExp('\\b' + voc.word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '\\b', 'gi');
      out = out.replace(re2, function(match) {
        return '§VOC§' + match + '§' + voc.zh + '§' + voc.freq + '§' + voc.collocations + '§/VOC§';
      });
    }
    
    // 还原词块
    out = out.replace(/§CH§(\w+)§(.+?)§\/CH§/g, '<span class="ch ch-$1">$2</span>');
    
    // 还原词汇
    out = out.replace(/§VOC§(.+?)§(.+?)§(.+?)§(.+?)§\/VOC§/g, function(match, word, zh, freq, coll) {
      var safeWord = word.replace(/'/g, "\\'");
      var safeZh = zh.replace(/'/g, "\\'");
      var safeFreq = freq.replace(/'/g, "\\'");
      var safeColl = coll.replace(/'/g, "\\'");
      return '<span class="voc" onmouseenter="showVocTip(event,\'' + safeWord + '\',\'' + safeZh + '\',\'' + safeFreq + '\',\'' + safeColl + '\')" onmouseleave="hideVocTip()">' + word + '</span>';
    });
    
    return out;
  }

  // 渲染字幕（带时间标签）
  var txHtml = '';
  for (var k = 0; k < TALK.cues.length; k++) {
    var cue = TALK.cues[k];
    txHtml += '<div class="cue">';
    txHtml += '<span class="cue-time">' + cue.time + '</span>';
    txHtml += '<span class="cue-en">' + highlightText(cue.en) + '</span>';
    txHtml += '<div class="cue-zh">' + cue.zh + '</div>';
    txHtml += '</div>';
  }
  document.getElementById('txBody').innerHTML = txHtml;

  // 渲染词块列表
  var chunksHtml = '';
  for (var m = 0; m < TALK.chunks.length; m++) {
    var ch = TALK.chunks[m];
    chunksHtml += '<div class="chunk-item ' + ch.type + '">';
    chunksHtml += '<div class="chunk-en">"' + ch.chunk + '"</div>';
    chunksHtml += '<div class="chunk-zh">' + ch.zh + '</div>';
    chunksHtml += '<div class="chunk-alts">替换表达：' + ch.alts.join(' / ') + '</div>';
    chunksHtml += '<span class="chunk-score">' + typeLabel[ch.type] + ' · ' + ch.score + '</span>';
    chunksHtml += '</div>';
  }
  document.getElementById('chunksBody').innerHTML = chunksHtml;
  
  // 渲染词汇卡片
  var vocabHtml = '';
  for (var n = 0; n < vocabList.length; n++) {
    var vocab = vocabList[n];
    var collocations = vocab.collocations.split(' / ');
    var collHtml = '';
    for (var p = 0; p < collocations.length; p++) {
      collHtml += '<div class="vocab-coll-item">' + collocations[p] + '</div>';
    }
    
    vocabHtml += '<div class="vocab-card">';
    vocabHtml += '<div class="vocab-word">' + vocab.word + '</div>';
    vocabHtml += '<div class="vocab-meaning">' + vocab.zh + '</div>';
    vocabHtml += '<div class="vocab-freq">' + vocab.freq + '</div>';
    vocabHtml += '<div class="vocab-collocations"><strong>常见搭配：</strong>' + collHtml + '</div>';
    vocabHtml += '</div>';
  }
  document.getElementById('vocabBody').innerHTML = vocabHtml;
}
</script>
</body>
</html>
