<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TED英语词块</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: sans-serif; background:#f7f3ec; color:#222; }
nav { background:#c0392b; padding:12px 16px; display:flex; align-items:center; gap:10px; }
nav a { color:#fff; text-decoration:none; font-size:14px; }
nav span { color:#fff; font-size:14px; font-weight:bold; margin-left:8px; }
.video-wrap { position:relative; width:100%; padding-bottom:56.25%; background:#000; }
.video-wrap iframe { position:absolute; inset:0; width:100%; height:100%; border:none; }
.loading-indicator { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#fff; font-size:14px; }
.content { padding:16px; max-width:800px; margin:0 auto; }
.talk-title { font-size:22px; font-weight:bold; margin-bottom:4px; }
.talk-sub { font-size:14px; color:#b5892e; margin-bottom:16px; }
.cue { padding:10px 0; border-bottom:1px solid #ddd; }
.cue-en { font-size:15px; line-height:1.7; }
.cue-zh { font-size:13px; color:#888; margin-top:3px; }
.ch { border-radius:3px; padding:1px 3px; font-weight:bold; cursor:pointer; }
.ch-op { background:#f0eaf9; color:#6b3fa0; }
.ch-ex { background:#e6f3f8; color:#1a6b8a; }
.ch-tr { background:#fdf0e2; color:#b85c00; }
.ch-em { background:#fae8ee; color:#a0264a; }
.ch-co { background:#e6f5ec; color:#2a7a4a; }
.chunks-section { margin-top:32px; padding-top:16px; border-top:2px solid #ddd; }
/* 雅思词汇高亮 */
.voc { background:#fff8c5; color:#7d5a00; border-bottom:2px solid #f0c040; border-radius:2px; padding:1px 2px; cursor:pointer; position:relative; }
.voc:hover { background:#fef0a0; }
/* Tooltip */
.tip-box { position:fixed; background:#1a1a2e; color:#eee; border-radius:10px; padding:14px 16px; width:240px; font-size:13px; z-index:9999; pointer-events:none; box-shadow:0 8px 32px rgba(0,0,0,.3); display:none; }
.tip-box.show { display:block; }
.tip-word { font-size:16px; font-weight:bold; color:#f0c040; margin-bottom:6px; }
.tip-row { margin-bottom:4px; line-height:1.5; }
.tip-label { color:#aaa; font-size:11px; }
.chunks-title { font-size:18px; font-weight:bold; margin-bottom:12px; }
.chunk-item { background:#fff; border-radius:8px; padding:12px; margin-bottom:10px; border-left:4px solid #ccc; }
.chunk-item.op { border-color:#6b3fa0; }
.chunk-item.ex { border-color:#1a6b8a; }
.chunk-item.tr { border-color:#b85c00; }
.chunk-item.em { border-color:#a0264a; }
.chunk-item.co { border-color:#2a7a4a; }
.chunk-en { font-size:15px; font-weight:bold; font-style:italic; margin-bottom:4px; }
.chunk-zh { font-size:13px; color:#666; margin-bottom:4px; }
.chunk-alts { font-size:12px; color:#888; }
.chunk-score { display:inline-block; background:#eee; border-radius:8px; padding:1px 8px; font-size:11px; color:#555; margin-top:4px; }
</style>
</head>
<body>
<div class="tip-box" id="tipBox">
  <div class="tip-word" id="tipWord"></div>
  <div class="tip-row"><span class="tip-label">词义：</span><span id="tipMeaning"></span></div>
  <div class="tip-row"><span class="tip-label">雅思频率：</span><span id="tipFreq"></span></div>
  <div class="tip-row"><span class="tip-label">常见搭配：</span><span id="tipCollocations"></span></div>
</div>
<nav>
  <a href="index.html">← 返回</a>
  <span id="navTitle">雅思口语词块</span>
</nav>
<div class="content">
  <div class="talk-title" id="tTitle"></div>
  <div class="talk-sub" id="tSub"></div>
  <div class="video-wrap">
    <div class="loading-indicator" id="videoLoading">视频加载中...</div>
    <iframe id="videoFrame" allowfullscreen allow="autoplay"></iframe>
  </div>
  <div style="margin-top:24px;" id="txBody"></div>
  <div class="chunks-section">
    <div class="chunks-title">📚 雅思口语词块</div>
    <div id="chunksBody"></div>
  </div>
</div>

<script>
var TALKS = [
  {
    id:"matt-cutts-30days",
    title:"Try Something New for 30 Days",
    title_zh:"尝试做新事情30天",
    speaker:"Matt Cutts", year:2011, duration:"3分钟",
    embed_url:"https://player.bilibili.com/player.html?bvid=BV1ZJ411W711&page=1&high_quality=1&danmaku=0",
    cues:[
      {en:"A few years ago, I felt like I was stuck in a rut, so I decided to follow in the footsteps of the great American philosopher, Morgan Spurlock, and try something new for 30 days.", zh:"几年前,我感觉自己陷入了一成不变的生活,所以我决定追随美国伟大的哲学家摩根·斯普尔洛克的脚步,尝试做新事情30天。"},
      {en:"The idea is actually pretty simple. Think about something you've always wanted to add to your life and try it for the next 30 days.", zh:"这个想法其实非常简单。想想你一直想在生活中加入的事情,然后在接下来的30天里尝试去做。"},
      {en:"It turns out 30 days is just about the right amount of time to add a new habit or subtract a habit -- like watching the news -- from your life.", zh:"事实证明,30天正好是在生活中养成一个新习惯或戒掉一个习惯——比如看新闻——的合适时间。"},
      {en:"There's a few things I learned while doing these 30-day challenges. The first was, instead of the months flying by, forgotten, the time was much more memorable.", zh:"做这些30天挑战时,我学到了几件事。第一件是,那些时光不再像以往那样飞逝而过、被遗忘,而是变得更加难忘。"},
      {en:"This was part of a challenge I did to take a picture every day for a month. And I remember exactly where I was and what I was doing that day.", zh:"这是我做的一个挑战的一部分——每天拍一张照片,持续一个月。我能清楚地记得那天我在哪里、在做什么。"},
      {en:"I also noticed that as I started to do more and harder 30-day challenges, my self-confidence grew. I went from desk-dwelling computer nerd to the kind of guy who bikes to work. For fun!", zh:"我还注意到,随着我开始做越来越多、越来越难的30天挑战,我的自信心也增强了。我从一个整天坐在桌前的电脑宅男,变成了一个骑自行车上班的人,而且是为了乐趣！"},
      {en:"Even last year, I ended up hiking up Mt. Kilimanjaro, the highest mountain in Africa. I would never have been that adventurous before I started my 30-day challenges.", zh:"就在去年,我甚至徒步登上了非洲最高峰——乞力马扎罗山。在我开始30天挑战之前,我从来不会有这么大的冒险精神。"},
      {en:"I also figured out that if you really want something badly enough, you can do anything for 30 days. Have you ever wanted to write a novel?", zh:"我还发现,如果你真的非常想要某件事,你可以坚持做任何事情30天。你有没有想过写一部小说？"},
      {en:"Every November, tens of thousands of people try to write their own 50,000-word novel, from scratch, in 30 days. It turns out, all you have to do is write 1,667 words a day for a month. So I did.", zh:"每年11月,数以万计的人尝试在30天内从头开始写一部5万字的小说。事实证明,你只需要每天写1667个字,坚持一个月。所以我就这么做了。"},
      {en:"By the way, the secret is not to go to sleep until you've written your words for the day. You might be sleep-deprived, but you'll finish your novel.", zh:"顺便说一句,秘诀是:在写完当天的字数之前不要睡觉。你可能会睡眠不足,但你会完成你的小说。"},
      {en:"Now is my book the next great American novel? No. I wrote it in a month. It's awful. But for the rest of my life, if I meet John Hodgman at a TED party, I don't have to say, 'I'm a computer scientist.' No, no, if I want to, I can say, 'I'm a novelist.'", zh:"那我的书是下一部伟大的美国小说吗？不是。我在一个月内写完的,写得很糟糕。但在我余生里,如果我在TED派对上遇到约翰·霍奇曼,我不必说'我是一个计算机科学家'了。不不,如果我愿意,我可以说'我是一个小说家'。"},
      {en:"So here's one last thing I'd like to mention. I learned that when I made small, sustainable changes, things I could keep doing, they were more likely to stick.", zh:"所以最后我想说一件事。我发现,当我做出小的、可持续的改变,那些我能够坚持下去的事情,它们更有可能成为习惯。"},
      {en:"There's nothing wrong with big, crazy challenges. In fact, they're a ton of fun. But they're less likely to stick.", zh:"大胆疯狂的挑战没有什么不对。事实上,它们非常有趣。但它们不太可能坚持下去。"},
      {en:"When I gave up sugar for 30 days, day 31 looked like this.", zh:"当我戒糖30天后,第31天就变成了这个样子。"},
      {en:"So here's my question to you: What are you waiting for? I guarantee you the next 30 days are going to pass whether you like it or not, so why not think about something you have always wanted to try and give it a shot for the next 30 days.", zh:"所以我的问题是:你在等什么？我保证接下来的30天无论如何都会过去,那为什么不想想你一直想尝试的事情,然后在接下来的30天里试一试呢？"},
    ],
    chunks:[
      {type:"op",chunk:"I felt like I was stuck in a rut",zh:"我感觉陷入了一成不变的生活",score:"Band 7+",alts:["I was in a routine I couldn't break","I felt trapped in the same patterns","I had lost my sense of direction"]},
      {type:"tr",chunk:"It turns out",zh:"事实证明;原来",score:"Band 6.5+",alts:["As it happens","In the end","Interestingly enough"]},
      {type:"op",chunk:"the months flying by",zh:"时间飞逝",score:"Band 7+",alts:["time passing quickly","days slipping away","the days rushing past"]},
      {type:"em",chunk:"much more memorable",zh:"更加难忘",score:"Band 6+",alts:["far more unforgettable","significantly more impactful","truly noteworthy"]},
      {type:"op",chunk:"my self-confidence grew",zh:"我的自信心增强了",score:"Band 6.5+",alts:["I became more confident","my confidence increased","I felt more assured"]},
      {type:"co",chunk:"For fun!",zh:"为了乐趣！",score:"Band 5+",alts:["Just for enjoyment","As a hobby","For pleasure"]},
      {type:"em",chunk:"I would never have been that adventurous",zh:"我从来不会有这么大的冒险精神",score:"Band 7+",alts:["I wouldn't have taken such risks","I'd have been too cautious","I'd never have dared"]},
      {type:"op",chunk:"if you really want something badly enough",zh:"如果你真的非常想要某件事",score:"Band 6.5+",alts:["if you're truly determined","if your desire is strong enough","if you're committed to something"]},
      {type:"tr",chunk:"By the way",zh:"顺便说一句",score:"Band 5+",alts:["Incidentally","On a side note","As an aside"]},
      {type:"em",chunk:"for the rest of my life",zh:"在我余生里",score:"Band 6+",alts:["from now on","for all my remaining years","forever after"]},
      {type:"op",chunk:"small, sustainable changes",zh:"小的、可持续的改变",score:"Band 7+",alts:["gradual, maintainable shifts","modest, lasting modifications","incremental, enduring adjustments"]},
      {type:"em",chunk:"they're more likely to stick",zh:"它们更有可能坚持下去",score:"Band 6.5+",alts:["they tend to last","they're easier to maintain","they become permanent"]},
    ]
  }
];

var VOCAB = {
  "matt-cutts-30days": [
    {word:"philosopher",zh:"哲学家；思想家",freq:"Academic 高频",collocations:"great philosopher / moral philosopher / ancient philosopher"},
    {word:"footsteps",zh:"脚步；足迹；榜样",freq:"General 中频",collocations:"follow in footsteps / hear footsteps / footsteps of success"},
    {word:"memorable",zh:"难忘的；值得纪念的",freq:"Academic 中频",collocations:"memorable experience / truly memorable / memorable moment"},
    {word:"challenge",zh:"挑战；质疑",freq:"Academic 极高频",collocations:"face a challenge / accept a challenge / 30-day challenge"},
    {word:"confidence",zh:"信心；自信",freq:"Academic 高频",collocations:"self-confidence / build confidence / confidence grew"},
    {word:"adventurous",zh:"爱冒险的；大胆的",freq:"General 中频",collocations:"adventurous spirit / feel adventurous / adventurous person"},
    {word:"novel",zh:"小说；新颖的(adj)",freq:"Academic 高频",collocations:"write a novel / great novel / novel idea"},
    {word:"sustainable",zh:"可持续的；可维持的",freq:"Academic 高频",collocations:"sustainable development / sustainable change / sustainable practice"},
  ]
};

var params = new URLSearchParams(location.search);
var TALK = null;
for (var i = 0; i < TALKS.length; i++) {
  if (TALKS[i].id === params.get('id')) { TALK = TALKS[i]; break; }
}

var vocabList = VOCAB[params.get('id')] || [];

// Tooltip 控制
function showVocTip(event, word, meaning, freq, collocations) {
  var tip = document.getElementById('tipBox');
  document.getElementById('tipWord').textContent = word;
  document.getElementById('tipMeaning').textContent = meaning;
  document.getElementById('tipFreq').textContent = freq;
  document.getElementById('tipCollocations').textContent = collocations;
  tip.classList.add('show');
  var x = event.clientX + 12;
  var y = event.clientY - 10;
  if (x + 250 > window.innerWidth) x = event.clientX - 262;
  if (y + 160 > window.innerHeight) y = event.clientY - 170;
  tip.style.left = Math.max(8, x) + 'px';
  tip.style.top = Math.max(8, y) + 'px';
}
function hideVocTip() {
  document.getElementById('tipBox').classList.remove('show');
}

// 页面加载完成后立即渲染内容
if (!TALK) {
  document.getElementById('txBody').innerHTML = '<p style="color:red;padding:20px">演讲未找到，请返回首页</p>';
  document.getElementById('videoLoading').textContent = '演讲数据未找到';
} else {
  // 立即更新页面标题和内容
  document.title = TALK.title_zh + ' · TED英语词块';
  document.getElementById('navTitle').textContent = TALK.title_zh;
  document.getElementById('tTitle').textContent = TALK.title;
  document.getElementById('tSub').textContent = TALK.speaker + ' · ' + TALK.year + ' · ' + TALK.duration;
  
  // 设置视频iframe
  var videoFrame = document.getElementById('videoFrame');
  videoFrame.src = TALK.embed_url;
  
  // 视频加载超时处理（5秒后隐藏加载提示）
  setTimeout(function() {
    var loadingEl = document.getElementById('videoLoading');
    if (loadingEl) {
      loadingEl.style.display = 'none';
    }
  }, 5000);

  var typeLabel = {op:'观点',ex:'举例',tr:'转折',em:'强调',co:'日常'};

  function highlightText(text) {
    var out = text;
    // 先高亮词块
    for (var j = 0; j < TALK.chunks.length; j++) {
      var c = TALK.chunks[j];
      var re = new RegExp(c.chunk.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi');
      out = out.replace(re, '§CH§' + c.type + '§' + c.chunk + '§/CH§');
    }
    // 再高亮词汇
    for (var v = 0; v < vocabList.length; v++) {
      var voc = vocabList[v];
      var re2 = new RegExp('\\b' + voc.word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '\\b', 'gi');
      out = out.replace(re2, function(match) {
        if (out.indexOf('§CH§') > -1 && out.lastIndexOf('§CH§') < out.lastIndexOf(match)) return match;
        return '§VOC§' + match + '§' + voc.zh + '§' + voc.freq + '§' + voc.collocations + '§/VOC§';
      });
    }
    // 还原词块
    out = out.replace(/§CH§(\w+)§(.+?)§\/CH§/g, '<span class="ch ch-$1">$2</span>');
    // 还原词汇
    out = out.replace(/§VOC§(.+?)§(.+?)§(.+?)§(.+?)§\/VOC§/g, function(match, word, zh, freq, coll) {
      return '<span class="voc" onmouseenter="showVocTip(event,\'' + word + '\',\'' + zh + '\',\'' + freq + '\',\'' + coll.replace(/'/g, '\\\'') + '\')" onmouseleave="hideVocTip()">' + word + '</span>';
    });
    return out;
  }

  // 立即渲染字幕内容
  var txHtml = '';
  for (var k = 0; k < TALK.cues.length; k++) {
    txHtml += '<div class="cue"><div class="cue-en">' + highlightText(TALK.cues[k].en) + '</div><div class="cue-zh">' + TALK.cues[k].zh + '</div></div>';
  }
  document.getElementById('txBody').innerHTML = txHtml;

  // 立即渲染词块列表
  var chunksHtml = '';
  for (var m = 0; m < TALK.chunks.length; m++) {
    var ch = TALK.chunks[m];
    chunksHtml += '<div class="chunk-item ' + ch.type + '">';
    chunksHtml += '<div class="chunk-en">"' + ch.chunk + '"</div>';
    chunksHtml += '<div class="chunk-zh">' + ch.zh + '</div>';
    chunksHtml += '<div class="chunk-alts">替换表达：' + ch.alts.join(' / ') + '</div>';
    chunksHtml += '<span class="chunk-score">' + typeLabel[ch.type] + ' · ' + ch.score + '</span>';
    chunksHtml += '</div>';
  }
  document.getElementById('chunksBody').innerHTML = chunksHtml;
}
</script>
</body>
</html>
